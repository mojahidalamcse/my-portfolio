<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360">
  <defs>
    <linearGradient id="bg" x1="0" x2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <linearGradient id="g-line" x1="0" x2="1">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg)" rx="12" ry="12" />

  <!-- Title -->
  <g font-family="Inter, Arial, Helvetica, sans-serif" fill="#fff">
    <text x="40" y="60" font-size="28" font-weight="700">BazarDaam Tracker</text>
    <text x="40" y="88" font-size="14" fill="#c7d2fe">Market price tracking & trends</text>
  </g>

  <!-- Chart area -->
  <g transform="translate(40,120)">
    <!-- grid lines -->
    <g stroke="#0b1220" stroke-width="1">
      <line x1="0" y1="0" x2="1120" y2="0" />
      <line x1="0" y1="48" x2="1120" y2="48" />
      <line x1="0" y1="96" x2="1120" y2="96" />
      <line x1="0" y1="144" x2="1120" y2="144" />
    </g>

    <!-- bars -->
    <g>
      <rect x="40" y="24" width="40" height="120" rx="6" fill="#0ea5a4" opacity="0.18" />
      <rect x="140" y="56" width="40" height="88" rx="6" fill="#f97316" opacity="0.18" />
      <rect x="240" y="8" width="40" height="136" rx="6" fill="#7c3aed" opacity="0.18" />
      <rect x="340" y="72" width="40" height="72" rx="6" fill="#06b6d4" opacity="0.18" />
      <rect x="440" y="40" width="40" height="104" rx="6" fill="#f59e0b" opacity="0.18" />
    </g>

    <!-- line trend -->
    <polyline points="20,120 80,80 160,100 260,60 360,110 460,90 560,70 660,50 760,80 860,40 960,60 1060,30" fill="none" stroke="url(#g-line)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />

    <!-- dots -->
    <g fill="#fff">
      <circle cx="20" cy="120" r="4" fill="#34d399" />
      <circle cx="80" cy="80" r="4" fill="#34d399" />
      <circle cx="160" cy="100" r="4" fill="#34d399" />
      <circle cx="260" cy="60" r="4" fill="#34d399" />
      <circle cx="360" cy="110" r="4" fill="#34d399" />
    </g>

    <!-- axis labels -->
    <g font-family="Inter, Arial, sans-serif" font-size="12" fill="#94a3b8">
      <text x="0" y="170">Jan</text>
      <text x="120" y="170">Feb</text>
      <text x="240" y="170">Mar</text>
      <text x="360" y="170">Apr</text>
      <text x="480" y="170">May</text>
      <text x="600" y="170">Jun</text>
    </g>
  </g>

  <!-- small legend -->
  <g transform="translate(920,40)">
    <rect x="0" y="0" width="16" height="8" rx="2" fill="#34d399" />
    <text x="24" y="8" font-size="12" fill="#cbd5e1" font-family="Inter, Arial">Price trend</text>
  </g>

</svg>